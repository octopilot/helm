name: CI

on:
  pull_request:
    paths: ["**"]
  push:
    branches: [main]
    paths: ["**"]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (default: from buildpack.toml)"
        required: false

env:
  IMAGE: ghcr.io/octopilot/helm

jobs:
  package:
    name: Package
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from buildpack.toml
        id: version
        run: |
          V=$(awk -F'"' '/^  version = / {print $2; exit}' buildpack.toml)
          echo "version=${V}" >> "$GITHUB_OUTPUT"

      - name: Package buildpack
        run: ./scripts/package.sh --version "${{ steps.version.outputs.version }}"

      - name: Verify buildpack.tgz
        run: |
          test -f build/buildpack.tgz
          tar tzf build/buildpack.tgz | head -5

  integration-oci-push:
    name: "Integration (Octopilot: op + chart path)"
    needs: [package]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout buildpacks/helm
        uses: actions/checkout@v4

      - name: Set build dir
        id: build-dir
        run: |
          if [ -d buildpacks/helm ] && [ -f buildpacks/helm/buildpack.toml ]; then
            echo "dir=buildpacks/helm" >> "$GITHUB_OUTPUT"
          else
            echo "dir=." >> "$GITHUB_OUTPUT"
          fi

      - name: Run op build (chart path, ttl.sh)
        env:
          SKAFFOLD_DEFAULT_REPO: ttl.sh/op-helm-${{ github.run_id }}
        run: |
          BUILD_DIR="${{ steps.build-dir.outputs.dir }}"
          FIXTURE_DIR="$BUILD_DIR/tests/integration-op"
          # Image entrypoint is "op"; pass subcommand and args only (no leading "op").
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w "/workspace/$FIXTURE_DIR" \
            -e GITHUB_WORKSPACE=/workspace \
            -e SKAFFOLD_DEFAULT_REPO="$SKAFFOLD_DEFAULT_REPO" \
            ghcr.io/octopilot/op:latest \
            build --ttl-uuid "op-helm-${{ github.run_id }}" --ttl-tag 1h --push

      - name: Verify build_result.json (chart ref with digest)
        run: |
          BUILD_DIR="${{ steps.build-dir.outputs.dir }}"
          cd "$BUILD_DIR/tests/integration-op"
          test -f build_result.json
          CHART_REF=$(jq -r '.builds[] | select(.imageName == "helm-op-test-chart") | .tag' build_result.json)
          echo "Chart ref: $CHART_REF"
          if [[ -z "$CHART_REF" ]]; then
            echo "FAIL: no helm-op-test-chart in build_result.json" >&2
            cat build_result.json
            exit 1
          fi
          if [[ "$CHART_REF" != *"sha256:"* ]]; then
            echo "FAIL: chart ref should contain sha256 digest: $CHART_REF" >&2
            exit 1
          fi
          echo "OK: chart ref has digest"

  push:
    name: Push to GHCR
    runs-on: ubuntu-24.04
    needs: [integration-oci-push]
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            V=$(awk -F'"' '/^  version = / {print $2; exit}' buildpack.toml)
            echo "version=${V}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package buildpack
        run: ./scripts/package.sh --version "${{ steps.version.outputs.version }}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GHCR
        run: ./scripts/publish.sh --image-ref "${{ env.IMAGE }}:${{ steps.version.outputs.version }}"
