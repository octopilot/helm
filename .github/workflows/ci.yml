name: CI

on:
  pull_request:
    paths: ["**"]
  push:
    branches: [main]
    paths: ["**"]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (default: from buildpack.toml)"
        required: false

env:
  IMAGE: ghcr.io/octopilot/helm

jobs:
  package:
    name: Package
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from buildpack.toml
        id: version
        run: |
          V=$(awk -F'"' '/^  version = / {print $2; exit}' buildpack.toml)
          echo "version=${V}" >> "$GITHUB_OUTPUT"

      - name: Package buildpack
        run: ./scripts/package.sh --version "${{ steps.version.outputs.version }}"

      - name: Verify buildpack.tgz
        run: |
          test -f build/buildpack.tgz
          tar tzf build/buildpack.tgz | head -5

  integration-oci-push:
    name: Integration (OCI push)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          V=$(awk -F'"' '/^  version = / {print $2; exit}' buildpack.toml)
          echo "version=${V}" >> "$GITHUB_OUTPUT"

      - name: Package buildpack
        run: ./scripts/package.sh --version "${{ steps.version.outputs.version }}"

      - name: Install Pack
        run: |
          PACK_VER="0.40.0"
          curl -sSL "https://github.com/buildpacks/pack/releases/download/v${PACK_VER}/pack-v${PACK_VER}-linux.tgz" | tar -xzf - -C /tmp
          sudo mv /tmp/pack /usr/local/bin/
          pack version

      - name: Run OCI push integration test
        run: |
          chmod +x tests/integration/run-oci-push.sh
          tests/integration/run-oci-push.sh "oci-${{ github.run_id }}"

      - name: Run OCI push failure test
        run: |
          chmod +x tests/integration/run-oci-push-failure.sh
          tests/integration/run-oci-push-failure.sh

  push:
    name: Push to GHCR
    runs-on: ubuntu-24.04
    needs: [package]
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            V=$(awk -F'"' '/^  version = / {print $2; exit}' buildpack.toml)
            echo "version=${V}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package buildpack
        run: ./scripts/package.sh --version "${{ steps.version.outputs.version }}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GHCR
        run: ./scripts/publish.sh --image-ref "${{ env.IMAGE }}:${{ steps.version.outputs.version }}"
