name: CI

on:
  pull_request:
    paths: ["**"]
  push:
    branches: [main]
    paths: ["**"]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (default: from buildpack.toml)"
        required: false

env:
  IMAGE: ghcr.io/octopilot/helm

jobs:
  package:
    name: Package
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from buildpack.toml
        id: version
        run: |
          V=$(awk -F'"' '/^  version = / {print $2; exit}' buildpack.toml)
          echo "version=${V}" >> "$GITHUB_OUTPUT"

      - name: Package buildpack
        run: ./scripts/package.sh --version "${{ steps.version.outputs.version }}"

      - name: Verify buildpack.tgz
        run: |
          test -f build/buildpack.tgz
          tar tzf build/buildpack.tgz | head -5

  integration-oci-push:
    name: "Integration (Octopilot: op + chart path)"
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout buildpacks/helm
        uses: actions/checkout@v4

      - name: Checkout octopilot-pipeline-tools
        uses: actions/checkout@v4
        with:
          repository: octopilot/octopilot-pipeline-tools
          path: octopilot-pipeline-tools

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: octopilot-pipeline-tools/go.mod

      - name: Build op
        run: |
          cd octopilot-pipeline-tools && go build -o op ./cmd/op && mv op .. && cd ..
          chmod +x op
          ./op version 2>/dev/null || ./op --help 2>/dev/null || true

      - name: Run op build (chart path, ttl.sh)
        env:
          SKAFFOLD_DEFAULT_REPO: ttl.sh/op-helm-${{ github.run_id }}
        run: |
          cd tests/integration-op
          ../op build --push=true
          cd ../..

      - name: Verify build_result.json (chart ref with digest)
        run: |
          cd tests/integration-op
          test -f build_result.json
          CHART_REF=$(jq -r '.builds[] | select(.imageName == "helm-op-test-chart") | .tag' build_result.json)
          echo "Chart ref: $CHART_REF"
          if [[ -z "$CHART_REF" ]]; then
            echo "FAIL: no helm-op-test-chart in build_result.json" >&2
            cat build_result.json
            exit 1
          fi
          if [[ "$CHART_REF" != *"sha256:"* ]]; then
            echo "FAIL: chart ref should contain sha256 digest: $CHART_REF" >&2
            exit 1
          fi
          echo "OK: chart ref has digest"

  push:
    name: Push to GHCR
    runs-on: ubuntu-24.04
    needs: [package, integration-oci-push]
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            V=$(awk -F'"' '/^  version = / {print $2; exit}' buildpack.toml)
            echo "version=${V}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package buildpack
        run: ./scripts/package.sh --version "${{ steps.version.outputs.version }}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GHCR
        run: ./scripts/publish.sh --image-ref "${{ env.IMAGE }}:${{ steps.version.outputs.version }}"
